#Empty executive
- type: entity
  id: JetpackExecSOL
  parent: [BaseJetpack, BaseGrandTheftContraband]
  name: solar legion executive's jetpack
  suffix: Empty
  components:
  - type: Sprite
    sprite: _Persistence14/Objects/Tanks/Jetpacks/exec.rsi
  - type: Clothing
    sprite: _Persistence14/Objects/Tanks/Jetpacks/exec.rsi
    slots:
      - Back
      - SuitStorage
  - type: Item
    sprite: _Persistence14/Objects/Tanks/Jetpacks/exec.rsi
    size: Normal
  - type: Tag
    tags:
    - HighRiskItem

# Filled executive
- type: entity
  id: JetpackExecSOLFilled
  parent: JetpackExecSOL
  name: solar legion executive's jetpack
  suffix: Filled
  components:
  - type: GasTank
    outputPressure: 42.6
    air:
      # 13 minutes of thrust
      volume: 5
      temperature: 293.15
      moles:
        Oxygen: 1.025689525 # oxygen
        Nitrogen: 1.025689525 # nitrogen
