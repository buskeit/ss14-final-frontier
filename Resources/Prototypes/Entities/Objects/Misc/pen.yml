    solutions:
      ink:
        maxVol: 150
        reagents:
        - ReagentId: InkBlack
          Quantity: 150
  - type: PenInk
    refillable: false

- type: entity
  id: BaseAdvancedPen
  parent: PenEmbeddable
  abstract: true
  components:
  - type: Tag
    tags:
    - Write
    - WriteIgnoreStamps
    - Pen
  - type: MeleeWeapon
    wideAnimationRotation: -45
    damage:
      types:
        Piercing: 15
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tool
    qualities:
    - Screwing
    useSound:
      collection: Screwdriver
  - type: SolutionContainerManager
    solutions:
      ink:
        maxVol: 100
        reagents:
        - ReagentId: InkBlack
          Quantity: 100
  - type: PenInk
    refillable: true

