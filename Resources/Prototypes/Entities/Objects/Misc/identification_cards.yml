- type: entity
  parent: Clothing
  id: IDCardStandard
  name: identification card
  description: A card necessary to access various areas aboard the station.
  abstract: true
  components:
    - type: Sprite
      sprite: Objects/Misc/id_cards.rsi
    - type: Clothing
      slots:
        - idcard
      sprite: Objects/Misc/id_cards.rsi
    - type: Item
      size: Small
      heldPrefix: default
      storedRotation: -90
    - type: Access
    - type: IdCard
    - type: StationRecordKeyStorage
    - type: Tag
      tags:
        - DoorBumpOpener
        - WhitelistChameleon
        - WhitelistChameleonIdCard
    - type: StealTarget
      stealGroup: IDCard
    - type: NanoChatCard #Final Frontier

#IDs with layers

- type: entity
  parent: IDCardStandard
  id: PassengerIDCard
  name: Passenger ID Card
  components:
    - type: Sprite
      layers:
        - state: default
        - sprite: &icon-rsi Interface/Misc/job_icons.rsi
          offset: &icon-offset -0.09375, 0.0625 #3 pixels left, 2 pixels up
          state: Passenger
    - type: PresetIdCard
      job: Passenger

