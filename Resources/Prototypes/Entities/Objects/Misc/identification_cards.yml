#Misc.

- type: entity
  parent: IDCardStandard
  id: PrisonerIDCard
  name: Prisoner ID Card
  description: A generically printed ID card for prisoners.
  components:
    - type: Sprite
      layers:
        - state: orange
        - sprite: *icon-rsi
          offset: *icon-offset
          state: Prisoner
    - type: Item
      heldPrefix: orange
    - type: Access
      tags:
        - GenpopEnter
    - type: GenpopIdCard
    - type: IdCard
      jobTitle: job-name-prisoner
      jobIcon: JobIconPrisoner
      canMicrowave: false
    - type: ExpireIdCard
      expireMessage: genpop-prisoner-id-expire
      expiredAccess:
        - GenpopLeave
    - type: Speech
      speechVerb: Robotic
    - type: Tag
      tags:
        - DoorBumpOpener
        - WhitelistChameleon
        - WhitelistChameleonIdCard
        - Recyclable
    - type: StaticPrice # these are infinitely producible.
      price: 0

