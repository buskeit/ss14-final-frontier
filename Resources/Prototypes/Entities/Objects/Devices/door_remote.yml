- type: entity
  parent: BaseItem
  id: DoorRemoteDefault
  name: Door Remote
  description: A gadget which can provide emergency access, open, close and bolt doors remotely.
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Devices/door_remote.rsi
  - type: Item
    storedRotation: -90
  - type: Access
  - type: DoorRemote
    includeUserAccess: true
    options:
    - mode: OpenClose
      tooltip: &TextOpenClose door-remote-open-close-text
      icon: &IconOpenClose
        sprite: /Textures/Structures/Doors/Airlocks/Standard/basic.rsi
        state: assembly
    - mode: ToggleBolts
      tooltip: &TextToggleBolt door-remote-toggle-bolt-text
      icon: &IconToggleBolt
        sprite: /Textures/Interface/Actions/actions_ai.rsi
        state: bolt_door
    - mode: ToggleEmergencyAccess
      tooltip: &TextEmergencyAccess door-remote-emergency-access-text
      icon: &IconEmergencyAccess
        sprite: /Textures/Interface/Actions/actions_ai.rsi
        state: emergency_on
  - type: StealTarget
    stealGroup: DoorRemote
  - type: ActivatableUI
    inHandsOnly: true
    key: enum.DoorRemoteUiKey.Key
  - type: UserInterface
    interfaces:
      enum.DoorRemoteUiKey.Key:
        type: DoorRemoteBoundUserInterface

- type: entity
  parent: DoorRemoteDefault
  id: DoorRemoteLinkable
  name: Linkable Door Remote
  description: A door remote that can be securely linked to one specific door.
  components:
  - type: Sprite
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#00e5d4"
    - state: door_remotescreencolour
      color: "#007f76"
  - type: DoorRemote
    linkable: true
    includeUserAccess: false
    options:
    - mode: OpenClose
      tooltip: *TextOpenClose
      icon: *IconOpenClose
  - type: DeviceLinkSource
    ports:
    - Pressed

- type: entity
  parent: DoorRemoteDefault
  id: DoorRemoteCanEletrifyDoors
  abstract: true
  components:
  - type: DoorRemote
    options:
    - mode: ToggleOvercharge
      tooltip: door-remote-toggle-eletrify-text
      icon:
        sprite: /Textures/Interface/Actions/actions_ai.rsi
        state: door_overcharge_on
    - mode: OpenClose
      tooltip: *TextOpenClose
      icon: *IconOpenClose
    - mode: ToggleBolts
      tooltip: *TextToggleBolt
      icon: *IconToggleBolt
    - mode: ToggleEmergencyAccess
      tooltip: *TextEmergencyAccess
      icon: *IconEmergencyAccess

- type: entity
  parent: [DoorRemoteDefault, BaseCommandContraband]
  id: DoorRemoteCommand
  name: Command Door Remote
  components:
  - type: Sprite
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#e6e600"
    - state: door_remotescreencolour
      color: "#9f9f00"
  - type: Access
    groups:
    - Command
  - type: DoorRemote

