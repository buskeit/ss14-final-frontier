  id: DoorRemoteAll
  name: Super Door Remote
  description: A gadget for admins which can access all doors remotely. If you find this, please return it or you will be banned. 
  suffix: Admeme
  components:
  - type: Sprite
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#2eba22"
    - state: door_remotescreencolour
      color: "#22871a"
  - type: DoorRemote
    includeUserAccess: true
    requireInRangeUnoccluded: false
    requireTagWhitelist: false
  - type: Access
    groups:
    - AllAccess
    tags:
    - CentralCommand
    - NuclearOperative
    - SyndicateAgent
    - Wizard
    - Xenoborg

