# Holo Walls

- type: entity
  id: HoloWallBlue  # Changed ID so it doesn't conflict with the sign
  name: blue holographic wall
  description: A flickering blue projection of a wall.
  placement:
    mode: SnapgridCenter
  components:
    - type: Physics
      bodyType: Static
      canCollide: false
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.49,-0.49,0.49,0.49"
          mask:
            - FullTileMask
          layer:
            - GlassLayer
    - type: Sprite
      sprite: Structures/Walls/solid.rsi # The path to standard wall textures
      drawdepth: Overlays
      layers:
      - state: full # The "icon" for a wall is just 'wall'
        color: "#00f2ff99" # Adjusts the color to a ghostly blue
    - type: PointLight
      enabled: true
      radius: 1
      color: blue
    - type: Damageable
      damageContainer: Inorganic
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 1
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
    - type: Clickable

