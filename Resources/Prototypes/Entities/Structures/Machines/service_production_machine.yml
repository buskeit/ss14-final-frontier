- type: entity
  id: ButcheringMachine
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  name: industrial butcherer
  description: Processes butcherable produce and carcasses for kitchen use.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: Structures/Machines/Medical/biomass_reclaimer.rsi
    state: icon
    snapCardinals: true
  - type: ButcheringMachine
  - type: Climbable
    delay: 7
  - type: AmbientSound
    enabled: false
    volume: -5
    range: 5
    sound:
      path: /Audio/Ambience/Objects/reclaimer_ambience.ogg
  - type: Machine
    board: ButcheringMachineCircuitboard
