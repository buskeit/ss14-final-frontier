- type: entity
  abstract: true
  parent: Clothing
  id: ClothingHeadset
  name: Headset
  description: An updated, modular intercom that fits over the head. Channel access is determined by the faction you target.
  components:
  - type: Headset
  - type: Appearance
  - type: Paintable
    group: ItemHeadsets
  - type: Sprite
    state: icon
  - type: Item
    size: Small
  - type: Clothing
    quickEquip: false
    slots:
    - ears
    sprite: Clothing/Ears/Headsets/base.rsi
  - type: GuideHelp
    guides:
    - Radio
  - type: UserInterface
    interfaces:
      enum.HeadsetMenuUiKey.Key:
        type: HeadsetMenuBoundUserInterface
  - type: ActivatableUI
    key: enum.HeadsetMenuUiKey.Key
    requiresComplex: true
    requireActiveHand: false
    singleUser: true
    inHandsOnly: false

