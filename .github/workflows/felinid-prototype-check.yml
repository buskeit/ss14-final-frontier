name: Felinid prototype check

on:
  push:
    branches:
      - testing
  pull_request:
    branches:
      - testing
  workflow_dispatch:

jobs:
  check-felinid-prototypes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify removed MobHumanDummy reference
        run: |
          if grep -R "MobHumanDummy" Resources/Prototypes; then
            echo "Found invalid MobHumanDummy prototype reference."
            exit 1
          fi
          echo "No MobHumanDummy prototype references found."

      - name: Verify Felinid uses existing setup preview
        run: |
          grep -q "dollPrototype: AppearanceHuman" Resources/Prototypes/Species/felinid.yml
          echo "Felinid species uses AppearanceHuman for character setup preview."
