- type: entity
  parent: BasePDACartridge
  id: StockTradingCartridge
  name: StockTrading cartridge
  description: A cartridge that allows tracking of the intergalactic stock market.
  components:
  - type: Sprite
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-stock
  - type: Icon
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-mail
  - type: UIFragment
    ui: !type:StockTradingUi
  - type: StockTradingCartridge
  - type: Cartridge
    programName: stock-trading-program-name
    icon:
      sprite: DeltaV/Misc/program_icons.rsi
      state: stock_trading
  - type: BankClient

- type: entity
  parent: BasePDACartridge
  id: NanoChatCartridge
  name: NanoChat Cartridge
  description: A modern, yet easy to use messenger service.
  components:
  - type: Sprite
    sprite: DeltaV/Objects/Devices/cartridge.rsi
    state: cart-chat
  - type: UIFragment
    ui: !type:NanoChatUi
  - type: NanoChatCartridge
  - type: Cartridge
    programName: nano-chat-program-name
    icon:
      sprite: DeltaV/Misc/program_icons.rsi
      state: nanochat
  - type: ActiveRadio
    channels:
    - Common
