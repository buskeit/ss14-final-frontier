- type: constructionGraph
  id: KanbanBoard
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: kanbanBoard
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 3
              doAfter: 2

    - node: kanbanBoard
      entity: KanbanBoard
      edges:
        - to: start
          completed:
            - !type:GivePrototype
              prototype: MaterialWoodPlank
              amount: 3
          steps:
            - tool: Prying
              doAfter: 3
