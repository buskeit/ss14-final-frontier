- type: constructionGraph
  id: StairsSteel
  start: start
  graph:
    - node: start
      edges:
        - to: done
          steps:
            - material: Steel
              amount: 4
              doAfter: 3

    - node: done
      entity: Stairs
      edges:
        - to: start
          completed:
